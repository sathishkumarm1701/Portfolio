<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="omsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b5bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Animated background orbs -->
  <circle cx="150" cy="100" r="200" fill="#5b5bff" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="250" fill="#7c3aed" opacity="0.1" filter="url(#glow)"/>
  <circle cx="600" cy="300" r="150" fill="#ec4899" opacity="0.05" filter="url(#glow)"/>

  <!-- Left side - Dashboard preview -->
  <g>
    <!-- Dashboard card -->
    <rect x="60" y="80" width="380" height="480" fill="rgba(30, 41, 59, 0.6)" stroke="rgba(148, 163, 184, 0.2)" stroke-width="2" rx="16" filter="url(#shadow)" backdrop-filter="blur(10px)"/>
    
    <!-- Dashboard header -->
    <rect x="60" y="80" width="380" height="60" fill="url(#omsGradient)" rx="16" rx-top="16"/>
    <text x="250" y="120" font-size="24" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Dashboard</text>
    
    <!-- Stats boxes -->
    <g>
      <!-- Orders stat -->
      <rect x="80" y="160" width="160" height="80" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
      <text x="160" y="185" font-size="28" font-weight="bold" fill="#3b82f6" text-anchor="middle" font-family="Arial, sans-serif">1,247</text>
      <text x="160" y="210" font-size="12" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif">Active Orders</text>
      
      <!-- Revenue stat -->
      <rect x="260" y="160" width="160" height="80" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="1.5" rx="8"/>
      <text x="340" y="185" font-size="28" font-weight="bold" fill="#8b5cf6" text-anchor="middle" font-family="Arial, sans-serif">$89.2K</text>
      <text x="340" y="210" font-size="12" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif">Total Revenue</text>
      
      <!-- Fulfillment stat -->
      <rect x="80" y="260" width="160" height="80" fill="rgba(236, 72, 153, 0.1)" stroke="#ec4899" stroke-width="1.5" rx="8"/>
      <text x="160" y="285" font-size="28" font-weight="bold" fill="#ec4899" text-anchor="middle" font-family="Arial, sans-serif">98.5%</text>
      <text x="160" y="310" font-size="12" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif">Fulfillment Rate</text>
      
      <!-- Response time stat -->
      <rect x="260" y="260" width="160" height="80" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1.5" rx="8"/>
      <text x="340" y="285" font-size="28" font-weight="bold" fill="#22c55e" text-anchor="middle" font-family="Arial, sans-serif">2.3s</text>
      <text x="340" y="310" font-size="12" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif">Avg Response</text>
    </g>

    <!-- Recent orders list -->
    <g>
      <text x="80" y="380" font-size="12" fill="#94a3b8" font-family="Arial, sans-serif" font-weight="600">RECENT ORDERS</text>
      
      <!-- Order item 1 -->
      <rect x="80" y="395" width="320" height="35" fill="rgba(59, 130, 246, 0.05)" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1" rx="6"/>
      <text x="95" y="415" font-size="11" fill="#e2e8f0" font-family="Arial, sans-serif" font-weight="600">ORD-2024-001</text>
      <text x="280" y="415" font-size="11" fill="#22c55e" font-family="Arial, sans-serif" font-weight="600">Delivered</text>
      
      <!-- Order item 2 -->
      <rect x="80" y="440" width="320" height="35" fill="rgba(139, 92, 246, 0.05)" stroke="rgba(139, 92, 246, 0.2)" stroke-width="1" rx="6"/>
      <text x="95" y="460" font-size="11" fill="#e2e8f0" font-family="Arial, sans-serif" font-weight="600">ORD-2024-002</text>
      <text x="280" y="460" font-size="11" fill="#f59e0b" font-family="Arial, sans-serif" font-weight="600">Processing</text>
    </g>
  </g>

  <!-- Right side - Main content -->
  <g>
    <!-- Title -->
    <text x="520" y="150" font-size="72" font-weight="900" fill="white" font-family="Arial, sans-serif" letter-spacing="2">OrderFlow</text>
    
    <!-- Subtitle -->
    <text x="520" y="195" font-size="24" fill="#5b5bff" font-family="Arial, sans-serif" font-weight="600">Order Management System</text>
    
    <!-- Description -->
    <text x="520" y="240" font-size="16" fill="#cbd5e1" font-family="Arial, sans-serif" font-weight="400">Real-time order tracking, analytics dashboard,</text>
    <text x="520" y="265" font-size="16" fill="#cbd5e1" font-family="Arial, sans-serif" font-weight="400">and scalable architecture for enterprise operations.</text>

    <!-- Features -->
    <g>
      <!-- Feature 1 -->
      <circle cx="540" cy="320" r="6" fill="#3b82f6"/>
      <text x="560" y="325" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">Real-time Order Tracking</text>
      
      <!-- Feature 2 -->
      <circle cx="540" cy="360" r="6" fill="#8b5cf6"/>
      <text x="560" y="365" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">Advanced Analytics Dashboard</text>
      
      <!-- Feature 3 -->
      <circle cx="540" cy="400" r="6" fill="#ec4899"/>
      <text x="560" y="405" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">Scalable Architecture</text>
      
      <!-- Feature 4 -->
      <circle cx="540" cy="440" r="6" fill="#22c55e"/>
      <text x="560" y="445" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">WebSocket Integration</text>
    </g>

    <!-- Tech Stack -->
    <text x="520" y="510" font-size="14" fill="#94a3b8" font-family="Arial, sans-serif" font-weight="600">TECH STACK:</text>
    <g font-size="12" fill="#cbd5e1" font-family="Arial, sans-serif">
      <text x="520" y="535">React.js • Node.js • MongoDB • Socket.io • Express</text>
      <text x="520" y="560">Real-time Updates • RESTful API • JWT Authentication</text>
    </g>

    <!-- Achievement badges -->
    <g>
      <!-- Badge 1 -->
      <rect x="520" y="580" width="130" height="35" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
      <text x="585" y="603" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle" font-family="Arial, sans-serif">Real-time Sync</text>
      
      <!-- Badge 2 -->
      <rect x="670" y="580" width="130" height="35" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="1.5" rx="6"/>
      <text x="735" y="603" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle" font-family="Arial, sans-serif">99.9% Uptime</text>
      
      <!-- Badge 3 -->
      <rect x="820" y="580" width="130" height="35" fill="rgba(236, 72, 153, 0.1)" stroke="#ec4899" stroke-width="1.5" rx="6"/>
      <text x="885" y="603" font-size="12" font-weight="bold" fill="#ec4899" text-anchor="middle" font-family="Arial, sans-serif">Enterprise Ready</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <line x1="80" y1="600" x2="1120" y2="600" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
</svg>