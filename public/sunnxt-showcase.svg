<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Animated background orbs -->
  <circle cx="150" cy="100" r="200" fill="#3b82f6" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="250" fill="#8b5cf6" opacity="0.1" filter="url(#glow)"/>
  <circle cx="600" cy="300" r="150" fill="#ec4899" opacity="0.05" filter="url(#glow)"/>

  <!-- Left sidebar icons (SunNXT style) -->
  <g opacity="0.6">
    <!-- Home icon -->
    <circle cx="40" cy="60" r="20" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M 30 65 L 40 55 L 50 65" fill="none" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Search icon -->
    <circle cx="40" cy="130" r="15" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="52" y1="142" x2="60" y2="150" stroke="#8b5cf6" stroke-width="2"/>
    
    <!-- Play icon -->
    <circle cx="40" cy="200" r="18" fill="none" stroke="#ec4899" stroke-width="2"/>
    <polygon points="35,190 35,210 50,200" fill="#ec4899"/>
    
    <!-- Downloads icon -->
    <rect x="25" y="260" width="30" height="25" fill="none" stroke="#3b82f6" stroke-width="2" rx="2"/>
    <line x1="40" y1="270" x2="40" y2="280" stroke="#3b82f6" stroke-width="2"/>
    <polyline points="32,278 40,286 48,278" fill="none" stroke="#3b82f6" stroke-width="2"/>
  </g>

  <!-- Main content area -->
  <g>
    <!-- SunNXT Logo -->
    <rect x="80" y="40" width="120" height="50" fill="#ff0000" rx="8" filter="url(#shadow)"/>
    <text x="140" y="75" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">NXT</text>
    
    <!-- Title -->
    <text x="80" y="150" font-size="72" font-weight="900" fill="white" font-family="Arial, sans-serif" letter-spacing="2">SUNNXT</text>
    
    <!-- Subtitle -->
    <text x="80" y="190" font-size="18" fill="#8b5cf6" font-family="Arial, sans-serif" font-weight="600">Premium OTT Streaming Platform</text>
    
    <!-- Stats/Features -->
    <g>
      <!-- Feature 1 -->
      <circle cx="100" cy="240" r="6" fill="#3b82f6"/>
      <text x="120" y="245" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">500K+ Fire TV Users</text>
      
      <!-- Feature 2 -->
      <circle cx="100" cy="280" r="6" fill="#8b5cf6"/>
      <text x="120" y="285" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">30% Performance Improvement</text>
      
      <!-- Feature 3 -->
      <circle cx="100" cy="320" r="6" fill="#ec4899"/>
      <text x="120" y="325" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">Amazon Collaboration</text>
      
      <!-- Feature 4 -->
      <circle cx="100" cy="360" r="6" fill="#3b82f6"/>
      <text x="120" y="365" font-size="14" fill="#e2e8f0" font-family="Arial, sans-serif">Advanced Video Streaming</text>
    </g>

    <!-- Tech Stack -->
    <text x="80" y="430" font-size="14" fill="#94a3b8" font-family="Arial, sans-serif" font-weight="600">TECH STACK:</text>
    <g font-size="12" fill="#cbd5e1" font-family="Arial, sans-serif">
      <text x="80" y="460">React Native • Fire TV • Redux Toolkit • Shaka Player</text>
      <text x="80" y="485">SpatialNavigation • Axios • WebView • Performance Optimization</text>
    </g>

    <!-- Achievement badges -->
    <g>
      <!-- Badge 1 -->
      <rect x="80" y="520" width="140" height="50" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="2" rx="8"/>
      <text x="150" y="540" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle" font-family="Arial, sans-serif">30%</text>
      <text x="150" y="560" font-size="11" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif">Performance Boost</text>
      
      <!-- Badge 2 -->
      <rect x="240" y="520" width="140" height="50" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="2" rx="8"/>
      <text x="310" y="540" font-size="20" font-weight="bold" fill="#8b5cf6" text-anchor="middle" font-family="Arial, sans-serif">1M+</text>
      <text x="310" y="560" font-size="11" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif">Users Reached</text>
      
      <!-- Badge 3 -->
      <rect x="400" y="520" width="140" height="50" fill="rgba(236, 72, 153, 0.1)" stroke="#ec4899" stroke-width="2" rx="8"/>
      <text x="470" y="540" font-size="20" font-weight="bold" fill="#ec4899" text-anchor="middle" font-family="Arial, sans-serif">500K+</text>
      <text x="470" y="560" font-size="11" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif">Fire TV Users</text>
    </g>
  </g>

  <!-- Right side - Visual elements -->
  <g opacity="0.8">
    <!-- Play button circle -->
    <circle cx="950" cy="200" r="80" fill="none" stroke="url(#accentGradient)" stroke-width="3" filter="url(#glow)"/>
    <polygon points="920,170 920,230 980,200" fill="url(#accentGradient)"/>
    
    <!-- Streaming waves -->
    <g stroke="url(#accentGradient)" stroke-width="2" fill="none" opacity="0.6">
      <path d="M 950 100 Q 1000 80 1050 100"/>
      <path d="M 950 120 Q 1000 100 1050 120"/>
      <path d="M 950 280 Q 1000 300 1050 280"/>
      <path d="M 950 300 Q 1000 320 1050 300"/>
    </g>

    <!-- Device representation -->
    <rect x="850" y="380" width="200" height="120" fill="rgba(59, 130, 246, 0.1)" stroke="url(#accentGradient)" stroke-width="2" rx="12" filter="url(#shadow)"/>
    <rect x="860" y="390" width="180" height="100" fill="rgba(15, 23, 42, 0.8)" rx="8"/>
    <text x="950" y="445" font-size="24" font-weight="bold" fill="#3b82f6" text-anchor="middle" font-family="Arial, sans-serif">📺</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="80" y1="600" x2="1120" y2="600" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
</svg>