<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Main title -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">
    Sathish Kumar M
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="42" text-anchor="middle" fill="#e2e8f0">
    React Native Developer
  </text>
  
  <!-- Tagline -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#cbd5e1">
    OTT & Amazon Fire TV Specialist
  </text>
  
  <!-- Description -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#94a3b8">
    3+ Years of Experience Building High-Performance Streaming Applications
  </text>
  
  <!-- Stats section -->
  <g>
    <!-- Stat 1 -->
    <rect x="150" y="450" width="250" height="120" rx="10" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="2"/>
    <text x="275" y="490" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#3b82f6">30%</text>
    <text x="275" y="525" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#cbd5e1">Performance</text>
    <text x="275" y="545" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#cbd5e1">Improvement</text>
    
    <!-- Stat 2 -->
    <rect x="475" y="450" width="250" height="120" rx="10" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="600" y="490" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#8b5cf6">1M+</text>
    <text x="600" y="525" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#cbd5e1">Users</text>
    <text x="600" y="545" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#cbd5e1">Reached</text>
    
    <!-- Stat 3 -->
    <rect x="800" y="450" width="250" height="120" rx="10" fill="rgba(236, 72, 153, 0.1)" stroke="#ec4899" stroke-width="2"/>
    <text x="925" y="490" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#ec4899">40%</text>
    <text x="925" y="525" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#cbd5e1">Seek</text>
    <text x="925" y="545" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#cbd5e1">Performance</text>
  </g>
</svg>
