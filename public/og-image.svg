<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="180" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="1050" cy="530" r="220" fill="#3b82f6" opacity="0.15"/>
  <circle cx="600" cy="315" r="150" fill="#ec4899" opacity="0.08"/>
  
  <!-- Top accent line -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="url(#textGradient)" stroke-width="3" opacity="0.6"/>
  
  <!-- Main title -->
  <text x="600" y="160" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="url(#textGradient)" filter="url(#glow)">
    Sathish Kumar M
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="48" font-weight="600" text-anchor="middle" fill="#e2e8f0">
    React Native Developer
  </text>
  
  <!-- Tagline -->
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#cbd5e1">
    OTT & Amazon Fire TV Specialist
  </text>
  
  <!-- Key metrics section -->
  <g>
    <!-- Metric 1 -->
    <rect x="80" y="360" width="280" height="200" rx="15" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="2"/>
    <text x="220" y="410" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#60a5fa">3+</text>
    <text x="220" y="445" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#cbd5e1">Years</text>
    <text x="220" y="470" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#cbd5e1">Experience</text>
    <text x="220" y="530" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#94a3b8">Building streaming</text>
    <text x="220" y="550" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#94a3b8">experiences</text>
  </g>
  
  <!-- Metric 2 -->
  <g>
    <rect x="460" y="360" width="280" height="200" rx="15" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="600" y="410" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#a78bfa">30%</text>
    <text x="600" y="445" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#cbd5e1">Performance</text>
    <text x="600" y="470" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#cbd5e1">Improvement</text>
    <text x="600" y="530" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#94a3b8">Optimized apps</text>
    <text x="600" y="550" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#94a3b8">for scale</text>
  </g>
  
  <!-- Metric 3 -->
  <g>
    <rect x="840" y="360" width="280" height="200" rx="15" fill="rgba(236, 72, 153, 0.1)" stroke="#ec4899" stroke-width="2"/>
    <text x="980" y="410" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#f472b6">1M+</text>
    <text x="980" y="445" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#cbd5e1">Users</text>
    <text x="980" y="470" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#cbd5e1">Reached</text>
    <text x="980" y="530" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#94a3b8">Millions served</text>
    <text x="980" y="550" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#94a3b8">globally</text>
  </g>
  
  <!-- Bottom accent line -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="url(#textGradient)" stroke-width="3" opacity="0.6"/>
  
  <!-- Footer text -->
  <text x="600" y="625" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#94a3b8">
    Premium React Native Developer | High-Performance Streaming Specialist
  </text>
</svg>
